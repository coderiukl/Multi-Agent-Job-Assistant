version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTRES_DB: ${POSTGRES_DB:-job_search_agent_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - job-search-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cv_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - job-search-network

  redis:
    image: redis:7-alpine
    container_name: cv_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - job-search-network

volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  job-search-network:
    driver: bridge